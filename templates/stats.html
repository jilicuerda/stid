<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Stats Loader</title>
    <style>
        /* Base Page Styling */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        /* Loader Layout */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .volleyball-wrapper {
            position: relative;
            width: 100px;
            height: 140px; /* Gives room for the bounce */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Animations */
        .ball-bouncer {
            /* ease-in makes it accelerate as it "falls" */
            animation: bounce 0.5s infinite alternate ease-in; 
        }

        .volleyball {
            width: 70px;
            height: 70px;
            animation: spin 1.5s infinite linear;
        }

        .shadow {
            width: 50px;
            height: 8px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            margin-top: 5px;
            animation: shadow-scale 0.5s infinite alternate ease-in;
        }

        .loading-text {
            margin-top: 24px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #555;
            animation: pulse 1s infinite alternate ease-in-out;
        }

        /* Keyframes */
        @keyframes bounce {
            0% { transform: translateY(-80px); }
            100% { transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shadow-scale {
            0% { transform: scale(0.4); opacity: 0.2; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* App Content Styling (For the simulation) */
        .hidden {
            display: none !important;
        }

        .app-dashboard {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .stat-box {
            background: #e9ecef;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 6px;
        }

        .refresh-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .refresh-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div id="loader-container" class="loader-container">
        <div class="volleyball-wrapper">
            <div class="ball-bouncer">
                <svg class="volleyball" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#2c3e50" stroke-width="4"/>
                    <path d="M 50 2 C 20 20, 20 80, 50 98" fill="none" stroke="#2c3e50" stroke-width="4"/>
                    <path d="M 2 50 C 20 20, 80 20, 98 50" fill="none" stroke="#2c3e50" stroke-width="4"/>
                    <path d="M 2 50 C 20 80, 80 80, 98 50" fill="none" stroke="#2c3e50" stroke-width="4"/>
                </svg>
            </div>
            <div class="shadow"></div>
        </div>
        <p class="loading-text">Crunching the stats...</p>
    </div>

    <div id="app-content" class="hidden app-dashboard">
        <h2>📊 Live Game Stats Ready!</h2>
        <div class="stat-box">Spike Success Rate: <strong>68%</strong></div>
        <div class="stat-box">Total Blocks: <strong>12</strong></div>
        <button class="refresh-btn" onclick="fetchStats()">Simulate Next Play</button>
    </div>

    <script>
        function fetchStats() {
            const loader = document.getElementById('loader-container');
            const content = document.getElementById('app-content');

            // 1. Show the loader, hide the stats dashboard
            loader.classList.remove('hidden');
            content.classList.add('hidden');

            // 2. Simulate the time it takes your app to calculate live stats
            setTimeout(() => {
                // 3. Hide the loader, reveal the updated stats
                loader.classList.add('hidden');
                content.classList.remove('hidden');
            }, 2500); 
        }

        // Start the animation simulation as soon as the page loads
        window.onload = fetchStats;
    </script>
</body>
</html>
