<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse & Stats - VolleyLive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Lexend', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <header class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2"><span class="material-symbols-outlined">query_stats</span> Analyse de Match</h1>
        <a href="/" class="bg-blue-900 px-4 py-2 rounded-lg font-bold hover:bg-blue-950 transition">Retour au Live</a>
    </header>

    <main class="max-w-6xl mx-auto mt-8 p-4">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
            <label class="block text-sm font-bold text-gray-600 mb-2 uppercase tracking-wide">Sélectionnez un match de votre club :</label>
            <div class="flex gap-4">
                <select id="matchSelect" class="flex-1 border border-gray-300 rounded-lg p-3 bg-gray-50 text-gray-800 font-semibold focus:ring-blue-500">
                    <option value="" disabled selected>Chargement des matchs en cours...</option>
                </select>
                <button onclick="loadStats()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition flex items-center gap-2 shadow-md">
                    <span class="material-symbols-outlined">analytics</span> Analyser
                </button>
            </div>
            <p id="loadingMsg" class="text-blue-500 font-bold mt-4 hidden animate-pulse">L'Intelligence Artificielle compile les statistiques... Veuillez patienter.</p>
        </div>

        <div id="statsContainer" class="hidden space-y-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 text-center">
                <h2 id="matchTitleDisplay" class="text-3xl font-black text-gray-800">Titre du match</h2>
            </div>
            
            <div id="setsGraphsZone" class="space-y-8">
                </div>
        </div>

    </main>

    <script>
        // Charger la liste des matchs au démarrage
        document.addEventListener("DOMContentLoaded", async () => {
            const sel = document.getElementById('matchSelect');
            try {
                const res = await fetch('/api/completed_matches');
                const data = await res.json();
                
                if (data.error) {
                    sel.innerHTML = `<option value="" disabled selected>Erreur: ${data.error}</option>`;
                    return;
                }

                if (data.length === 0) {
                    sel.innerHTML = '<option value="" disabled selected>Aucun match enregistré pour ce club.</option>';
                    return;
                }

                sel.innerHTML = '<option value="" disabled selected>Choisissez un match enregistré...</option>';
                data.forEach(m => {
                    sel.innerHTML += `<option value="${m.id}">${m.title}</option>`;
                });
            } catch (e) {
                sel.innerHTML = '<option value="" disabled selected>Erreur de communication avec le serveur.</option>';
            }
        });

        async function loadStats() {
            const matchId = document.getElementById('matchSelect').value;
            if (!matchId) return;

            document.getElementById('loadingMsg').classList.remove('hidden');
            document.getElementById('statsContainer').classList.add('hidden');

            try {
                const res = await fetch(`/api/match_stats/${matchId}`);
                const data = await res.json();

                if (data.error) {
                    alert("Erreur: " + data.error);
                    document.getElementById('loadingMsg').classList.add('hidden');
                    return;
                }

                document.getElementById('matchTitleDisplay').innerText = data.match_title;
                const zone = document.getElementById('setsGraphsZone');
                zone.innerHTML = '';

                data.sets.forEach(s => {
                    
                    // Génération du tableau d'efficacité pour l'équipe Domicile
                    let effHomeHTML = '';
                    let totHomeM = 0, totHomeE = 0, totHomeD = 0;
                    s.eff_home.forEach(row => {
                        totHomeM += row.m; totHomeE += row.e; totHomeD += row.d;
                        effHomeHTML += `<tr><td class="p-2 border-b font-bold text-blue-600">N°${row.num}</td><td class="p-2 border-b text-center text-green-600 font-semibold">${row.m}</td><td class="p-2 border-b text-center text-red-500 font-semibold">${row.e}</td><td class="p-2 border-b text-center font-black ${row.d > 0 ? 'text-green-600' : (row.d < 0 ? 'text-red-500' : 'text-gray-500')}">${row.d > 0 ? '+'+row.d : row.d}</td></tr>`;
                    });

                    // Génération du tableau d'efficacité pour l'équipe Extérieure
                    let effAwayHTML = '';
                    let totAwayM = 0, totAwayE = 0, totAwayD = 0;
                    s.eff_away.forEach(row => {
                        totAwayM += row.m; totAwayE += row.e; totAwayD += row.d;
                        effAwayHTML += `<tr><td class="p-2 border-b font-bold text-orange-500">N°${row.num}</td><td class="p-2 border-b text-center text-green-600 font-semibold">${row.m}</td><td class="p-2 border-b text-center text-red-500 font-semibold">${row.e}</td><td class="p-2 border-b text-center font-black ${row.d > 0 ? 'text-green-600' : (row.d < 0 ? 'text-red-500' : 'text-gray-500')}">${row.d > 0 ? '+'+row.d : row.d}</td></tr>`;
                    });

                    zone.innerHTML += `
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                            <div class="flex justify-between items-center mb-6 border-b pb-4">
                                <h3 class="text-2xl font-bold text-gray-800">Set ${s.set}</h3>
                                <span class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg font-black text-xl border border-gray-300">Score: ${s.score}</span>
                            </div>
                            
                            <div class="mb-8">
                                <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"><span class="material-symbols-outlined text-sm align-middle">bar_chart</span> Séquences de Points (Duel)</h4>
                                ${s.graph_duel ? `<img src="data:image/png;base64,${s.graph_duel}" class="w-full rounded-xl border border-gray-100 shadow-sm">` : '<p class="text-red-500 italic">Erreur de génération du duel.</p>'}
                            </div>

                            <div class="mb-8">
                                <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"><span class="material-symbols-outlined text-sm align-middle">sports_volleyball</span> Rotation de départ du set</h4>
                                ${s.graph_rot ? `<img src="data:image/png;base64,${s.graph_rot}" class="w-full max-w-3xl mx-auto block rounded-xl border border-gray-100 shadow-sm">` : '<p class="text-red-500 italic">Erreur de génération du terrain.</p>'}
                            </div>

                            <div>
                                <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"><span class="material-symbols-outlined text-sm align-middle">troubleshoot</span> Analyse d'efficacité sur Service</h4>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    
                                    <div class="border border-blue-200 rounded-xl overflow-hidden">
                                        <div class="bg-blue-50 text-blue-800 font-bold p-3 text-center border-b border-blue-200">Notre Équipe (Bleu)</div>
                                        <table class="w-full text-sm bg-white">
                                            <thead>
                                                <tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
                                                    <th class="p-2 text-left">Serveur</th><th class="p-2">Pts Marqués</th><th class="p-2">Pts Encaissés</th><th class="p-2">Différence</th>
                                                </tr>
                                            </thead>
                                            <tbody>${effHomeHTML}</tbody>
                                            <tfoot>
                                                <tr class="bg-blue-50/50 font-bold text-blue-900 border-t-2 border-blue-200">
                                                    <td class="p-2">TOTAL</td><td class="p-2 text-center">${totHomeM}</td><td class="p-2 text-center">${totHomeE}</td><td class="p-2 text-center">${totHomeD > 0 ? '+'+totHomeD : totHomeD}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>

                                    <div class="border border-orange-200 rounded-xl overflow-hidden">
                                        <div class="bg-orange-50 text-orange-800 font-bold p-3 text-center border-b border-orange-200">Adversaire (Orange)</div>
                                        <table class="w-full text-sm bg-white">
                                            <thead>
                                                <tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
                                                    <th class="p-2 text-left">Serveur</th><th class="p-2">Pts Marqués</th><th class="p-2">Pts Encaissés</th><th class="p-2">Différence</th>
                                                </tr>
                                            </thead>
                                            <tbody>${effAwayHTML}</tbody>
                                            <tfoot>
                                                <tr class="bg-orange-50/50 font-bold text-orange-900 border-t-2 border-orange-200">
                                                    <td class="p-2">TOTAL</td><td class="p-2 text-center">${totAwayM}</td><td class="p-2 text-center">${totAwayE}</td><td class="p-2 text-center">${totAwayD > 0 ? '+'+totAwayD : totAwayD}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>

                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('statsContainer').classList.remove('hidden');

            } catch (e) {
                alert("Erreur de connexion lors du téléchargement des graphiques.");
            } finally {
                document.getElementById('loadingMsg').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
